<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Vannesa Enojada</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: pink;
      font-family: Impact, Arial Black, sans-serif;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== IMÁGENES =====
const angryBg = new Image();
angryBg.src = "VanesaSprite/Fondo.png";
let bgLoaded = false;
angryBg.onload = () => bgLoaded = true;

// 👉 IMAGEN DE INICIO (PNG)
const startImg = loadImg("inicio.png");

// 👉 IMÁGENES DE FINAL
const winImg = loadImg("VanesaSprite/happy.png");
const loseImg = loadImg("VanesaSprite/Fondo.png");

// TIPOS DE COMIDA
const foodTypes = [
  { img: loadImg("Comida/comida1.png"), size: 80 },
  { img: loadImg("Comida/comida2.png"), size: 60 },
  { img: loadImg("Comida/comida3.png"), size: 90 }
];

function loadImg(src) {
  const img = new Image();
  img.src = src;
  img.loaded = false;
  img.onload = () => img.loaded = true;
  img.onerror = () => console.warn("No cargó: " + src);
  return img;
}

// ===== ESTADO =====
let score = 0;
let misses = 0;
let maxMisses = 5;
let gameOver = false;
let win = false;
let timeLeft = 30;
let gameStarted = false;

// 👉 BOTÓN REINICIAR
let restartBtn = {
  x: canvas.width / 2 - 120,
  y: canvas.height / 2 + 250,
  width: 240,
  height: 70
};

const player = {
  x: canvas.width / 2,
  y: canvas.height - 100,
  width: 100,
  height: 100,
  mouthOpen: false
};

let foods = [];
let spawnRate = 1500;

function createFood() {
  if (gameOver || !gameStarted) return;

  const type = foodTypes[Math.floor(Math.random() * foodTypes.length)];

  foods.push({
    x: Math.random() * canvas.width,
    y: -50,
    size: type.size,
    speed: 2 + Math.random() * 2,
    img: type.img
  });
}

function increaseDifficulty() {
  if (spawnRate > 400) spawnRate -= 100;
}

canvas.addEventListener("mousemove", (e) => {
  player.x = e.clientX;
});

canvas.addEventListener("mousedown", (e) => {
  if (!gameStarted) {
    gameStarted = true;
    return;
  }

  // 👉 REINICIAR SI TERMINÓ
  if (gameOver) {
    const mx = e.clientX;
    const my = e.clientY;

    if (
      mx >= restartBtn.x &&
      mx <= restartBtn.x + restartBtn.width &&
      my >= restartBtn.y &&
      my <= restartBtn.y + restartBtn.height
    ) {
      restartGame();
    }
    return;
  }

  player.mouthOpen = true;
});

canvas.addEventListener("mouseup", () => {
  player.mouthOpen = false;
});

function drawStartScreen() {
  if (bgLoaded) {
    ctx.drawImage(angryBg, 0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  } else {
    ctx.fillStyle = "pink";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // 👉 IMAGEN PNG DE INICIO
  if (startImg.loaded) {
    const size = 300;
    ctx.drawImage(
      startImg,
      canvas.width / 2 - size / 2,
      canvas.height / 2 - size - 100,
      size,
      size
    );
  }

  ctx.fillStyle = "white";
  ctx.textAlign = "center";

  ctx.font = "bold 80px Impact";
  ctx.fillText("VANNESA ENOJADA", canvas.width/2, canvas.height/2 - 60);

  ctx.font = "bold 40px Impact";
  ctx.fillText("HAZ CLIC PARA EMPEZAR", canvas.width/2, canvas.height/2 + 40);
}

// 👉 IMÁGENES DEL JUGADOR
const playerClosedImg = loadImg("VanesaSprite/vaneclose.png");
const playerOpenImg = loadImg("VanesaSprite/vaneopen.png");

function drawPlayer() {
  let img = player.mouthOpen ? playerOpenImg : playerClosedImg;

  if (img.loaded) {
    ctx.drawImage(
      img,
      player.x - player.width / 2,
      player.y - player.height / 2,
      player.width,
      player.height
    );
  } else {
    ctx.fillStyle = "yellow";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.width/2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawFoods() {
  foods.forEach((food, index) => {
    food.y += food.speed;

    if (food.img.loaded) {
      ctx.drawImage(food.img, food.x, food.y, food.size, food.size);
    } else {
      ctx.fillStyle = "red";
      ctx.beginPath();
      ctx.arc(food.x, food.y, food.size/2, 0, Math.PI * 2);
      ctx.fill();
    }

    const dist = Math.hypot(player.x - food.x, player.y - food.y);
    if (dist < player.width/2 && player.mouthOpen) {
      foods.splice(index, 1);
      score++;
    }

    if (food.y > canvas.height) {
      foods.splice(index, 1);
      misses++;
      if (misses >= maxMisses) gameOver = true;
    }
  });
}

function drawUI() {
  ctx.fillStyle = "white";
  ctx.font = "bold 28px Impact";
  ctx.fillText("PUNTOS: " + score, 20, 40);
  ctx.fillText("FALLOS: " + misses + "/" + maxMisses, 20, 80);
  ctx.fillText("TIEMPO: " + timeLeft, 20, 120);
}

function drawEndScreen() {
  ctx.fillStyle = "rgba(0,0,0,0.7)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = "center";

  let img = win ? winImg : loseImg;

  if (img.loaded) {
    const size = 300;
    ctx.drawImage(img, canvas.width/2 - size/2, canvas.height/2 - size/2, size, size);
  }

  ctx.fillStyle = "white";
  ctx.font = "bold 50px Impact";

  if (win) {
    ctx.fillText("¡GANASTE!", canvas.width/2, canvas.height/2 + 200);
  } else {
    ctx.fillText("PERDISTE", canvas.width/2, canvas.height/2 + 200);
  }

  // 👉 BOTÓN REINICIAR
  ctx.fillStyle = "white";
  ctx.fillRect(restartBtn.x, restartBtn.y, restartBtn.width, restartBtn.height);

  ctx.fillStyle = "black";
  ctx.font = "bold 30px Impact";
  ctx.fillText(
    "REINICIAR",
    restartBtn.x + restartBtn.width / 2,
    restartBtn.y + 45
  );
}

function restartGame() {
  score = 0;
  misses = 0;
  timeLeft = 30;
  foods = [];
  gameOver = false;
  win = false;
  gameStarted = false;
}

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!gameStarted) {
    drawStartScreen();
  } else if (!gameOver) {
    drawPlayer();
    drawFoods();
    drawUI();
  } else {
    drawEndScreen();
  }

  requestAnimationFrame(gameLoop);
}

setInterval(createFood, spawnRate);
setInterval(increaseDifficulty, 3000);

setInterval(() => {
  if (gameStarted && !gameOver) {
    timeLeft--;
    if (timeLeft <= 0) {
      win = true;
      gameOver = true;
    }
  }
}, 1000);

gameLoop();
</script>
</body>
</html>
